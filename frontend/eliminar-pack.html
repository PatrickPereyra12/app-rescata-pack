<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar Inventario - RescataPack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card-eliminar { border: 2px solid #dc3545; transition: transform 0.2s; }
        .card-eliminar:hover { transform: scale(1.02); box-shadow: 0 10px 20px rgba(220,53,69,0.2); }
    </style>
</head>
<body>

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold" style="color: #2c3e50;">🗑️ Panel de Eliminación de Packs</h2>
            <a href="restaurante.html" class="btn btn-secondary fw-bold">Volver a Publicar</a>
        </div>
        
        <p class="text-muted mb-4">Revisa tu inventario activo. Haz clic en eliminar para retirar un pack de la aplicación. Esta acción no se puede deshacer.</p>

        <div class="row g-4" id="contenedor-packs">
            <div class="text-center mt-5 text-muted" id="mensaje-carga">Cargando packs...</div>
        </div>
    </div>

    <script>
        // 1. Función para traer todos los packs y mostrarlos en pantalla
        async function cargarPacks() {
            try {
                const response = await fetch('http://localhost:3000/api/packs');
                const packs = await response.json();
                
                const contenedor = document.getElementById('contenedor-packs');
                contenedor.innerHTML = ''; // Limpiamos el contenedor

                if(packs.length === 0) {
                    contenedor.innerHTML = '<div class="text-center mt-5 text-muted"><h5>No hay packs publicados actualmente.</h5></div>';
                    return;
                }

                // Generamos una tarjeta por cada pack
                packs.forEach(pack => {
                    contenedor.innerHTML += `
                        <div class="col-md-6 col-lg-4">
                            <div class="card card-eliminar h-100 p-3 bg-white">
                                <div class="card-body text-center">
                                    <h4 class="card-title fw-bold text-danger">${pack.descripcion}</h4>
                                    <p class="text-muted mb-1">${pack.nombre_restaurante}</p>
                                    <p class="fs-5 fw-bold text-dark mt-2">S/ ${pack.precio_oferta}</p>
                                    
                                    <button onclick="borrarPackDefinitivo(${pack.id_pack})" class="btn btn-danger w-100 mt-3 fw-bold">
                                        Eliminar Definitivamente
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Error al cargar:", error);
                document.getElementById('contenedor-packs').innerHTML = '<div class="alert alert-danger">Error de conexión con el servidor local.</div>';
            }
        }

        // 2. Función para borrar un pack al hacer clic
        async function borrarPackDefinitivo(idPack) {
            // Confirmación de seguridad
            if (!confirm("¿Estás completamente seguro de borrar este pack del sistema?")) {
                return;
            }

            try {
                // Llamamos a la ruta DELETE del Backend
                const res = await fetch(`http://localhost:3000/api/packs/${idPack}`, {
                    method: 'DELETE'
                });
                
                const data = await res.json();
                
                if (data.success) {
                    alert(data.mensaje);
                    // Recargamos los packs para que el borrado desaparezca visualmente al instante
                    cargarPacks();
                } else {
                    alert("No se pudo eliminar: " + data.mensaje);
                }
            } catch (error) {
                console.error("Error:", error);
                alert("Hubo un problema de red.");
            }
        }

        // Ejecutar la carga de packs al abrir la página
        window.onload = cargarPacks;
    </script>
</body>
</html>
